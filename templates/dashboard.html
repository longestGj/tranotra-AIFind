<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Tranotra Leads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="container-fluid py-4">
        <!-- Header Section -->
        <div class="row mb-4">
            <div class="col-md-8">
                <h1 class="dashboard-title" id="dashboard-title">系统运行效率仪表板 (最近7天)</h1>
                <p class="text-muted">Search performance metrics and analytics</p>
            </div>
            <div class="col-md-4 text-end">
                <label for="period-filter" class="form-label">时间段 (Period):</label>
                <select class="form-select form-select-lg" id="period-filter">
                    <option value="7">最近7天 (7 Days)</option>
                    <option value="14">最近14天 (14 Days)</option>
                    <option value="30">最近30天 (30 Days)</option>
                </select>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="text-center d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">数据加载中... (Loading...)</p>
        </div>

        <!-- Error Alert -->
        <div id="error-alert" class="alert alert-danger alert-dismissible fade d-none" role="alert">
            <strong>数据加载失败 (Error):</strong>
            <span id="error-message"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            <div class="mt-2">
                <button class="btn btn-sm btn-outline-danger" onclick="loadDashboard()">重新加载 (Retry)</button>
            </div>
        </div>

        <!-- No Data Message -->
        <div id="no-data-message" class="alert alert-warning alert-dismissible fade d-none" role="alert">
            <strong>数据不足 (No Data):</strong> 所选时间段内没有数据。请继续搜索。
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Metrics Cards Section -->
        <div id="metrics-container" class="metrics-grid">
            <!-- Cards will be inserted here by JavaScript -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        // Initialize dashboard on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboard();

            // Listen for period filter changes
            document.getElementById('period-filter').addEventListener('change', function(e) {
                loadDashboard();
            });
        });
    </script>
</body>
</html>
